<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaDB Documents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="laser-canvas"></canvas>

    <div id="effect-selector-container">
        <select id="effect-selector">
            <option value="none">None</option>
            <option value="laser">Laser Effect</option>
            <option value="lightspeed-white">White Lightspeed</option>
            <option value="lightspeed-blue">Blue Lightspeed</option>
            <option value="lightspeed-red">Red Lightspeed</option>
        </select>
    </div>

    <h1>Stored Documents</h1>

    <div id="document-list"></div>

    <script src="script.js"></script>
</body>
</html>
